<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book your Appointment</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #loading-spinner {
            text-align: center;
            margin-top: 100px;
            color: #666;
            font-size: 18px;
        }
    </style>
    <script type="text/javascript">
      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; C.Cal = C.Cal || function () { let am = arguments; p(C.Cal, am); }; C.Cal.q = C.Cal.q || []; window.addEventListener("load", function () { C.Cal("init"); }); })(window, window.Cal || {});
    </script>
</head>
<body>

    <div id="loading-spinner">⏳ Loading appointment calendar... Please wait.</div>

    <div id="cal-booking-embed" style="width:100%; height:100%; min-height:700px;"></div>

    <script>
      // Cleanly init and inject your exact Cal.com event slug
      Cal("inline", {
        elementOrSelector: "#cal-booking-embed",
        calLink: "fg-legend-owlm6l/demo-clinic",
        config: {"layout":"month_view"}
      });

      // Hide the loading spinner text the moment the calendar layout renders
      Cal("on", {
        action: "linkReady",
        callback: () => {
          document.getElementById("loading-spinner").style.display = "none";
        }
      });

      // The Interceptor Loophole to bounce them back to WhatsApp
      Cal("on", {
        action: "bookingSuccessful",
        callback: (e) => {
          window.location.href = "https://wa.me/15556465032";
        }
      });
    </script>

</body>
</html>
